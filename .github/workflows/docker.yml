name: Docker Build & Push

on:
  push:
    branches:
      - main
  # 可选：手动触发，方便调试
  workflow_dispatch:

jobs:
  check-dockerfile:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4  # 升级到 v4
        with:
          fetch-depth: 0

      - name: Check Dockerfile changes
        id: check
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^Docker/Dockerfile$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build-amd64:
    needs: check-dockerfile
    if: needs.check-dockerfile.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      # 1. 关键：释放磁盘空间（强烈推荐！防止 no space left on device）
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main  # 非常有效，能释放 20-40GB
        # 或者用：easimon/maximize-build-space@master

      # 2. Checkout 代码
      - name: Checkout
        uses: actions/checkout@v4

      # 3. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录 Docker Hub（推荐使用 GitHub 内置 secrets 方式，更安全）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. 构建并推送镜像（关键优化）
      - name: Build and Push amd64 Image
        uses: docker/build-push-action@v6  # 升级到最新 v6
        with:
          context: .
          file: Docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: fanyucai1/scrna:latest
          # 推荐添加以下参数，避免磁盘爆炸 + 加速构建
          cache-from: type=gha  # 使用 GitHub Actions 缓存
          cache-to: type=gha,mode=max  # 缓存所有层，加速下次构建
          # 如果镜像很大，可考虑不加载到本地（节省空间）
          # load: false  # 只 push 不 load（如果你不需要本地测试）

      # 6. 可选：构建完成后清理 Docker 系统（进一步释放空间）
      - name: Cleanup Docker
        if: always()  # 即使失败也清理
        run: |
          docker system prune -af --volumes || true
          docker builder prune -af || true